openapi: 3.0.3
info:
  title: Content Broadcasting System API
  version: 1.0.0
  contact:
    name: Prashant Singh
    email: your@email.com
  description: |
    JWT protected API.

    Click Authorize and enter:
    Bearer <token>

    API documentation for the Content Broadcasting System. This backend supports user authentication, content upload and approval, real-time polling, and live broadcast retrieval.
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://content-broadcasting-system-h4uo.onrender.com
    description: Render deployment server
  - url: http://65.0.30.203:3000
    description: EC2 deployment server
tags:
  - name: Authentication
    description: User registration and login flows
  - name: Content
    description: Teacher content upload and retrieval
  - name: Approvals
    description: Principal approval workflows
  - name: Polls
    description: Poll creation, voting, and results
  - name: Broadcasting
    description: Live broadcast and content retrieval
paths:
  /health:
    get:
      tags:
        - Broadcasting
      summary: Health check
      description: Returns basic server health information.
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/content/upload:
    post:
      tags:
        - Content
      summary: Upload content
      description: Teacher uploads content file and metadata for approval.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Classroom Lesson Plan
                description:
                  type: string
                  example: A video tutorial for biology class.
                subject:
                  type: string
                  enum: [maths, science, english, history]
                  example: science
                start_time:
                  type: string
                  format: date-time
                  example: 2026-07-01T08:00:00Z
                end_time:
                  type: string
                  format: date-time
                  example: 2026-07-01T10:00:00Z
                rotation_duration:
                  type: integer
                  example: 5
                file:
                  type: string
                  format: binary
              required: [title, subject, file]
      responses:
        '201':
          description: Content uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadContentResponse'
        '400':
          description: Validation or upload error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/content/my-content:
    get:
      tags:
        - Content
      summary: Get teacher's uploaded content
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Content list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyContentResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/approval/pending:
    get:
      tags:
        - Approvals
      summary: Get pending content for approval
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending content returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentListResponse'
  /api/approval/all:
    get:
      tags:
        - Approvals
      summary: Get all content
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All content returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentListResponse'
  /api/approval/{id}/approve:
    patch:
      tags:
        - Approvals
      summary: Approve content
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Content approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveRejectResponse'
        '404':
          description: Content not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/approval/{id}/reject:
    patch:
      tags:
        - Approvals
      summary: Reject content
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: Incorrect content or schedule conflict
              required: [reason]
      responses:
        '200':
          description: Content rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveRejectResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Content not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/polls/active:
    get:
      tags:
        - Polls
      summary: Get active public polls
      responses:
        '200':
          description: Active polls returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollListResponse'
  /api/polls/{id}/vote:
    post:
      tags:
        - Polls
      summary: Vote on a poll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                option_index:
                  type: integer
                  example: 1
                voter_session:
                  type: string
                  example: session-12345
              required: [option_index, voter_session]
      responses:
        '200':
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteResponse'
        '400':
          description: Validation or voting error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Poll not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/polls:
    post:
      tags:
        - Polls
      summary: Create a new poll
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePollRequest'
      responses:
        '201':
          description: Poll created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePollResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/polls/my-polls:
    get:
      tags:
        - Polls
      summary: Get polls created by the authenticated teacher
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Teacher polls returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollListResponse'
  /api/polls/{id}/toggle:
    patch:
      tags:
        - Polls
      summary: Toggle a poll active state
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Poll toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TogglePollResponse'
        '404':
          description: Poll not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/polls/{id}:
    delete:
      tags:
        - Polls
      summary: Delete a poll
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Poll deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePollResponse'
        '404':
          description: Poll not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/broadcast/live/{teacherId}:
    get:
      tags:
        - Broadcasting
      summary: Get live content for a specific teacher
      parameters:
        - name: teacherId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Live content returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveContentResponse'
        '404':
          description: Teacher not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/broadcast/all:
    get:
      tags:
        - Broadcasting
      summary: Get live content from all teachers
      responses:
        '200':
          description: All live content returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllLiveContentResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        timestamp:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
          example: Prashant Singh
        email:
          type: string
          format: email
          example: principal@example.com
        password:
          type: string
          example: Password123!
        role:
          type: string
          enum: [principal, teacher]
          example: principal
      required: [name, email, password, role]
    RegisterResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: principal@example.com
        password:
          type: string
          example: Password123!
      required: [email, password]
    LoginResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
        user:
          $ref: '#/components/schemas/UserSummary'
    ProfileResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
    UploadContentResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            content:
              $ref: '#/components/schemas/ContentSummary'
    MyContentResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
        data:
          type: object
          properties:
            contents:
              type: array
              items:
                $ref: '#/components/schemas/ContentSummary'
    ContentListResponse:
      type: object
      properties:
        contents:
          type: array
          items:
            $ref: '#/components/schemas/ContentDetail'
    ApproveRejectResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            content:
              $ref: '#/components/schemas/ContentDetail'
    VoteResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            vote_counts:
              type: array
              items:
                $ref: '#/components/schemas/VoteCount'
            total_votes:
              type: integer
    CreatePollRequest:
      type: object
      properties:
        question:
          type: string
          example: Which topic should we cover next?
        options:
          type: array
          items:
            type: string
          example:
            - Algebra
            - Geometry
        end_time:
          type: string
          format: date-time
          example: 2026-08-01T18:00:00Z
      required: [question, options]
    CreatePollResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            poll:
              $ref: '#/components/schemas/PollDetail'
    PollListResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/PollDetail'
    TogglePollResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            poll:
              $ref: '#/components/schemas/PollDetail'
    DeletePollResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    LiveContentResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            teacher:
              type: string
            timestamp:
              type: string
              format: date-time
            content:
              $ref: '#/components/schemas/ActiveContent'
    AllLiveContentResponse:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        data:
          type: array
          items:
            type: object
            properties:
              teacher:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
              content:
                $ref: '#/components/schemas/ActiveContent'
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        success:
          type: boolean
    UserSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Prashant Singh
        email:
          type: string
          format: email
          example: principal@example.com
        role:
          type: string
          example: principal
    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          properties:
            created_at:
              type: string
              format: date-time
              example: 2026-06-04T12:00:00Z
    ContentSummary:
      type: object
      properties:
        id:
          type: integer
          example: 100
        title:
          type: string
          example: Classroom Lesson Plan
        subject:
          type: string
          example: science
        file_url:
          type: string
          example: https://example-bucket.s3.amazonaws.com/lesson.mp4
        status:
          type: string
          example: pending
        start_time:
          type: string
          format: date-time
          example: 2026-07-01T08:00:00Z
        end_time:
          type: string
          format: date-time
          example: 2026-07-01T10:00:00Z
        rotation_duration:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
          example: 2026-06-04T12:00:00Z
    ContentDetail:
      type: object
      properties:
        id:
          type: integer
          example: 100
        title:
          type: string
          example: Classroom Lesson Plan
        description:
          type: string
          example: A video tutorial for biology class.
        subject:
          type: string
          example: science
        file_url:
          type: string
          example: https://example-bucket.s3.amazonaws.com/lesson.mp4
        file_type:
          type: string
          example: video/mp4
        file_size:
          type: integer
          example: 10485760
        start_time:
          type: string
          format: date-time
          example: 2026-07-01T08:00:00Z
        end_time:
          type: string
          format: date-time
          example: 2026-07-01T10:00:00Z
        rotation_duration:
          type: integer
          example: 5
        status:
          type: string
          example: approved
        uploaded_by:
          type: integer
          example: 2
        approved_by:
          type: integer
          example: 1
        approved_at:
          type: string
          format: date-time
          example: 2026-07-01T11:00:00Z
        rejection_reason:
          type: string
          example: Content does not meet guidelines
        created_at:
          type: string
          format: date-time
          example: 2026-06-04T12:00:00Z
    PollDetail:
      type: object
      properties:
        id:
          type: integer
          example: 10
        question:
          type: string
          example: Which topic should we cover next?
        options:
          type: array
          items:
            type: string
          example:
            - Algebra
            - Geometry
        teacher_id:
          type: integer
          example: 2
        is_active:
          type: boolean
          example: true
        end_time:
          type: string
          format: date-time
          example: 2026-08-01T18:00:00Z
        created_at:
          type: string
          format: date-time
          example: 2026-06-04T12:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2026-06-04T12:30:00Z
        vote_counts:
          type: array
          items:
            $ref: '#/components/schemas/VoteCount'
        total_votes:
          type: integer
          example: 24
    VoteCount:
      type: object
      properties:
        option:
          type: string
          example: Algebra
        votes:
          type: integer
          example: 12
    ActiveContent:
      type: object
      properties:
        id:
          type: integer
          example: 100
        title:
          type: string
          example: Classroom Lesson Plan
        description:
          type: string
          example: A video tutorial for biology class.
        subject:
          type: string
          example: science
        file_url:
          type: string
          example: https://example-bucket.s3.amazonaws.com/lesson.mp4
        file_type:
          type: string
          example: video/mp4
        file_size:
          type: integer
          example: 10485760
        start_time:
          type: string
          format: date-time
          example: 2026-07-01T08:00:00Z
        end_time:
          type: string
          format: date-time
          example: 2026-07-01T10:00:00Z
        rotation_duration:
          type: integer
          example: 5
        status:
          type: string
          example: approved
        uploaded_by:
          type: integer
          example: 2
        approved_by:
          type: integer
          example: 1
        approved_at:
          type: string
          format: date-time
          example: 2026-07-01T11:00:00Z
