version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbs-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - redis
    networks:
      - cbs-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cbs-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cbs-network

networks:
  cbs-network:
    driver: bridge